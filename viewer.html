<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess Tournament Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #eee; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 20px; }
  .container { display: flex; gap: 24px; max-width: 1100px; width: 100%; flex-wrap: wrap; justify-content: center; }

  /* Board */
  .board-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .player-bar { display: flex; align-items: center; gap: 10px; font-size: 15px; width: 480px; padding: 8px 12px; border-radius: 8px; background: #16213e; }
  .player-bar .dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #555; flex-shrink: 0; }
  .player-bar .dot.white { background: #fff; }
  .player-bar .dot.black { background: #222; }
  .player-bar .name { font-weight: 600; flex: 1; }
  .player-bar .badge { font-size: 12px; padding: 2px 8px; border-radius: 4px; }
  .badge.win { background: #2ecc71; color: #000; }
  .badge.lose { background: #e74c3c; }
  .badge.draw { background: #f39c12; color: #000; }

  #board { display: grid; grid-template-columns: repeat(8, 60px); grid-template-rows: repeat(8, 60px); border: 3px solid #0f3460; border-radius: 4px; box-shadow: 0 0 30px rgba(15, 52, 96, 0.5); }
  .sq { width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 44px; cursor: default; position: relative; transition: background 0.15s; line-height: 1; }
  .sq .piece-w { color: #ffffff; text-shadow: 0 0 2px #000, 0 0 2px #000, 1px 1px 1px rgba(0,0,0,0.6); }
  .sq .piece-b { color: #1a1a1a; text-shadow: 0 0 3px rgba(255,255,255,0.3); }
  .sq.light { background: #f0d9b5; }
  .sq.dark { background: #8ca2ad; }
  .sq.highlight { box-shadow: inset 0 0 0 3px #ff6b6b; }
  .sq.last-from { background: #aad576 !important; }
  .sq.last-to { background: #7ec945 !important; }

  .rank-label, .file-label { position: absolute; font-size: 10px; font-weight: 700; opacity: 0.6; }
  .rank-label { top: 2px; left: 3px; }
  .file-label { bottom: 1px; right: 3px; }
  .sq.light .rank-label, .sq.light .file-label { color: #b08968; }
  .sq.dark .rank-label, .sq.dark .file-label { color: #d5e0e5; }

  /* Controls */
  .controls { display: flex; align-items: center; gap: 8px; }
  .controls button { background: #16213e; border: 1px solid #0f3460; color: #eee; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 16px; transition: background 0.15s; }
  .controls button:hover { background: #0f3460; }
  .controls button:disabled { opacity: 0.3; cursor: default; }
  .speed-label { font-size: 13px; color: #aaa; margin-left: 8px; }
  #speedSlider { width: 100px; accent-color: #e94560; }

  /* Sidebar */
  .sidebar { display: flex; flex-direction: column; gap: 16px; min-width: 300px; max-width: 380px; flex: 1; }
  .panel { background: #16213e; border-radius: 10px; padding: 16px; }
  .panel h3 { font-size: 14px; color: #e94560; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }

  /* Standings */
  .standings-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .standings-table th { text-align: left; padding: 4px 8px; color: #aaa; border-bottom: 1px solid #333; }
  .standings-table td { padding: 6px 8px; }
  .standings-table tr.active-bot td { color: #f1c40f; font-weight: 600; }
  .medal { margin-right: 4px; }

  /* Game selector */
  .game-list { display: flex; flex-direction: column; gap: 6px; }
  .game-btn { background: #1a1a2e; border: 1px solid #333; color: #ccc; padding: 10px 12px; border-radius: 8px; cursor: pointer; text-align: left; font-size: 13px; transition: all 0.15s; }
  .game-btn:hover { border-color: #e94560; }
  .game-btn.active { border-color: #e94560; background: #2a1a3e; color: #fff; }
  .game-btn .game-result { float: right; font-weight: 700; }
  .game-btn .game-players { font-weight: 600; }
  .game-btn .game-info { font-size: 11px; color: #888; margin-top: 3px; }

  /* Move list */
  .move-list { max-height: 220px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.7; padding: 8px; background: #111; border-radius: 6px; }
  .move-list::-webkit-scrollbar { width: 6px; }
  .move-list::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
  .move-num { color: #888; }
  .move-san { cursor: pointer; padding: 1px 3px; border-radius: 3px; }
  .move-san:hover { background: #333; }
  .move-san.current { background: #e94560; color: #fff; }

  /* Status */
  .status-bar { text-align: center; font-size: 14px; min-height: 22px; color: #f39c12; font-weight: 600; }

  /* Mode badges */
  .live-badge { display: inline-flex; align-items: center; gap: 6px; background: #e94560; color: #fff; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 700; }
  .live-badge .dot { width: 8px; height: 8px; border-radius: 50%; background: #fff; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .mode-btn { font-weight: 700; font-size: 13px !important; }
  .mode-btn.live { background: #e94560 !important; border-color: #e94560 !important; }
  .mode-btn.live:hover { background: #c0392b !important; }
  .mode-btn.stop { background: #555 !important; border-color: #555 !important; }
  .mode-btn.stop:hover { background: #c0392b !important; }
  .mode-btn.replay { background: #2ecc71 !important; border-color: #2ecc71 !important; color: #000 !important; }
  .mode-btn.replay:hover { background: #27ae60 !important; }

  /* Mode overlay */
  .mode-select { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 40px; text-align: center; }
  .mode-select h2 { font-size: 20px; color: #e94560; }
  .mode-select p { color: #aaa; font-size: 14px; }
  .mode-select .btn-row { display: flex; gap: 12px; }
  .mode-select button { padding: 12px 28px; border-radius: 8px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  .mode-select .btn-live { background: #e94560; color: #fff; }
  .mode-select .btn-live:hover { background: #c0392b; }
  .mode-select .btn-replay { background: #2ecc71; color: #000; }
  .mode-select .btn-replay:hover { background: #27ae60; }
  .mode-select .btn-live:disabled { opacity: 0.4; cursor: default; }
  .file-drop { border: 2px dashed #555; border-radius: 10px; padding: 20px; color: #888; font-size: 13px; cursor: pointer; transition: border-color 0.2s; max-width: 400px; }
  .file-drop:hover, .file-drop.dragover { border-color: #2ecc71; color: #eee; }
  .file-drop input { display: none; }
</style>
</head>
<body>

<!-- Mode Selection Overlay -->
<div id="modeOverlay" class="mode-select" style="display:none;">
  <h2>Chess Tournament Viewer</h2>
  <p id="modeDesc">모드를 선택하세요</p>
  <div class="btn-row">
    <button class="btn-live" id="btnModeLive">LIVE 관전</button>
    <button class="btn-replay" id="btnModeReplay">복기 모드</button>
  </div>
  <div id="fileUploadArea" style="display:none; margin-top: 12px;">
    <div class="file-drop" id="fileDrop">
      토너먼트 결과 폴더의 <b>all_games.pgn</b>과 <b>results.json</b>을<br>
      여기에 드래그하거나 클릭하여 선택하세요
      <input type="file" id="fileInput" multiple accept=".pgn,.json">
    </div>
  </div>
</div>

<!-- Main Viewer (hidden until mode selected) -->
<div class="container" id="mainViewer" style="display:none;">
  <div class="board-wrap">
    <div class="player-bar" id="topBar">
      <div class="dot black"></div>
      <span class="name" id="topName">-</span>
      <span class="badge" id="topBadge"></span>
    </div>
    <div id="board"></div>
    <div class="player-bar" id="bottomBar">
      <div class="dot white"></div>
      <span class="name" id="bottomName">-</span>
      <span class="badge" id="bottomBadge"></span>
    </div>
    <div class="status-bar" id="status"></div>
    <div class="controls" style="margin-bottom: 4px;">
      <button id="btnStop" class="mode-btn stop" title="대국 중단" style="display:none;">STOP</button>
    </div>
    <div class="controls">
      <button id="btnStart" title="처음">&#x23EE;</button>
      <button id="btnPrev" title="이전">&#x25C0;</button>
      <button id="btnPlay" title="재생/정지">&#x25B6;</button>
      <button id="btnNext" title="다음">&#x25B6;&#xFE0E;</button>
      <button id="btnEnd" title="끝">&#x23ED;</button>
      <span class="speed-label">속도</span>
      <input type="range" id="speedSlider" min="1" max="10" value="5">
    </div>
  </div>

  <div class="sidebar">
    <div class="panel">
      <h3>순위</h3>
      <table class="standings-table" id="standings"></table>
    </div>
    <div class="panel">
      <h3>대국 선택</h3>
      <div class="game-list" id="gameList"></div>
    </div>
    <div class="panel">
      <h3>기보</h3>
      <div class="move-list" id="moveList"></div>
    </div>
  </div>
</div>

<script>
// ── Minimal Chess Engine (board state + SAN parser) ──
const PIECE_UNICODE = {
  K: '\u2654', Q: '\u2655', R: '\u2656', B: '\u2657', N: '\u2658', P: '\u2659',
  k: '\u265A', q: '\u265B', r: '\u265C', b: '\u265D', n: '\u265E', p: '\u265F'
};

class ChessGame {
  constructor() { this.reset(); }
  reset() {
    this.board = this.initBoard();
    this.turn = 'w';
    this.castling = { K: true, Q: true, k: true, q: true };
    this.enPassant = null;
  }
  initBoard() {
    const b = Array(8).fill(null).map(() => Array(8).fill(null));
    const back = ['r','n','b','q','k','b','n','r'];
    for (let c = 0; c < 8; c++) {
      b[0][c] = back[c]; b[1][c] = 'p';
      b[6][c] = 'P'; b[7][c] = back[c].toUpperCase();
    }
    return b;
  }
  get(r, c) { return this.board[r]?.[c] ?? null; }
  set(r, c, v) { this.board[r][c] = v; }
  isWhite(p) { return p && p === p.toUpperCase(); }

  applyMove(san) {
    const white = this.turn === 'w';
    let from, to, promo = null;

    if (san === 'O-O' || san === 'O-O-O') {
      const row = white ? 7 : 0;
      const king = white ? 'K' : 'k'; const rook = white ? 'R' : 'r';
      if (san === 'O-O') {
        this.set(row, 4, null); this.set(row, 7, null);
        this.set(row, 6, king); this.set(row, 5, rook);
        from = [row, 4]; to = [row, 6];
      } else {
        this.set(row, 4, null); this.set(row, 0, null);
        this.set(row, 2, king); this.set(row, 3, rook);
        from = [row, 4]; to = [row, 2];
      }
      this.updateCastling(from, to);
      this.enPassant = null;
      this.turn = white ? 'b' : 'w';
      return { from, to };
    }

    let s = san.replace(/[+#!?]/g, '');
    if (s.includes('=')) {
      const parts = s.split('=');
      s = parts[0];
      promo = white ? parts[1][0] : parts[1][0].toLowerCase();
    }

    if (s[0] >= 'a' && s[0] <= 'h') {
      const isCapture = s.includes('x');
      const dest = isCapture ? s.split('x')[1] : s;
      const tc = dest.charCodeAt(0) - 97;
      const tr = 8 - parseInt(dest[1]);
      const fc = isCapture ? (s.charCodeAt(0) - 97) : tc;
      const dir = white ? 1 : -1;
      let fr = -1;

      if (isCapture) {
        if (this.get(tr, tc) !== null) { fr = tr + dir; }
        else if (this.enPassant && this.enPassant[0] === tr && this.enPassant[1] === tc) {
          fr = tr + dir; this.set(tr + dir, tc, null);
        } else { fr = tr + dir; }
      } else {
        if (this.get(tr, tc) === null) {
          if (this.get(tr + dir, fc) !== null && ((white && this.get(tr + dir, fc) === 'P') || (!white && this.get(tr + dir, fc) === 'p'))) { fr = tr + dir; }
          else if (this.get(tr + 2 * dir, fc) !== null) { fr = tr + 2 * dir; }
        }
      }

      from = [fr, fc]; to = [tr, tc];
      this.set(tr, tc, promo || this.get(fr, fc));
      this.set(fr, fc, null);
      if (Math.abs(fr - tr) === 2) { this.enPassant = [Math.floor((fr + tr) / 2), tc]; }
      else { this.enPassant = null; }
      this.updateCastling(from, to);
      this.turn = white ? 'b' : 'w';
      return { from, to };
    }

    const pieceChar = s[0];
    const piece = white ? pieceChar : pieceChar.toLowerCase();
    let rest = s.slice(1);
    let disambigFile = -1, disambigRank = -1;

    if (rest.includes('x')) {
      const before = rest.split('x')[0];
      rest = rest.split('x')[1];
      if (before.length === 1) {
        if (before[0] >= 'a' && before[0] <= 'h') disambigFile = before.charCodeAt(0) - 97;
        else disambigRank = 8 - parseInt(before[0]);
      } else if (before.length === 2) {
        disambigFile = before.charCodeAt(0) - 97;
        disambigRank = 8 - parseInt(before[1]);
      }
    } else {
      if (rest.length === 3) {
        if (rest[0] >= 'a' && rest[0] <= 'h') disambigFile = rest.charCodeAt(0) - 97;
        else disambigRank = 8 - parseInt(rest[0]);
        rest = rest.slice(1);
      } else if (rest.length === 4) {
        disambigFile = rest.charCodeAt(0) - 97;
        disambigRank = 8 - parseInt(rest[1]);
        rest = rest.slice(2);
      }
    }

    const tc = rest.charCodeAt(0) - 97;
    const tr = 8 - parseInt(rest[1]);
    const candidates = this.findPiece(piece, tr, tc, disambigFile, disambigRank);
    if (candidates.length === 0) {
      console.warn('No candidate for', san, piece, tr, tc);
      this.turn = white ? 'b' : 'w';
      return { from: [tr, tc], to: [tr, tc] };
    }

    from = candidates[0];
    this.set(tr, tc, piece);
    this.set(from[0], from[1], null);
    to = [tr, tc];
    this.enPassant = null;
    this.updateCastling(from, to);
    this.turn = white ? 'b' : 'w';
    return { from, to };
  }

  updateCastling(from, to) {
    if (from[0] === 7 && from[1] === 4) { this.castling.K = false; this.castling.Q = false; }
    if (from[0] === 0 && from[1] === 4) { this.castling.k = false; this.castling.q = false; }
    if (from[0] === 7 && from[1] === 7) this.castling.K = false;
    if (from[0] === 7 && from[1] === 0) this.castling.Q = false;
    if (from[0] === 0 && from[1] === 7) this.castling.k = false;
    if (from[0] === 0 && from[1] === 0) this.castling.q = false;
    if (to[0] === 7 && to[1] === 7) this.castling.K = false;
    if (to[0] === 7 && to[1] === 0) this.castling.Q = false;
    if (to[0] === 0 && to[1] === 7) this.castling.k = false;
    if (to[0] === 0 && to[1] === 0) this.castling.q = false;
  }

  findPiece(piece, tr, tc, disambigFile, disambigRank) {
    const results = [];
    for (let r = 0; r < 8; r++) {
      for (let c = 0; c < 8; c++) {
        if (this.get(r, c) !== piece) continue;
        if (disambigFile >= 0 && c !== disambigFile) continue;
        if (disambigRank >= 0 && r !== disambigRank) continue;
        if (this.canReach(piece, r, c, tr, tc)) results.push([r, c]);
      }
    }
    return results;
  }

  canReach(piece, fr, fc, tr, tc) {
    const dr = tr - fr, dc = tc - fc;
    const type = piece.toUpperCase();
    if (type === 'N') return (Math.abs(dr) === 2 && Math.abs(dc) === 1) || (Math.abs(dr) === 1 && Math.abs(dc) === 2);
    if (type === 'B') return Math.abs(dr) === Math.abs(dc) && dr !== 0 && this.pathClear(fr, fc, tr, tc);
    if (type === 'R') return (dr === 0 || dc === 0) && (dr !== 0 || dc !== 0) && this.pathClear(fr, fc, tr, tc);
    if (type === 'Q') return ((dr === 0 || dc === 0) || Math.abs(dr) === Math.abs(dc)) && (dr !== 0 || dc !== 0) && this.pathClear(fr, fc, tr, tc);
    if (type === 'K') return Math.abs(dr) <= 1 && Math.abs(dc) <= 1;
    return false;
  }

  pathClear(fr, fc, tr, tc) {
    const dr = Math.sign(tr - fr), dc = Math.sign(tc - fc);
    let r = fr + dr, c = fc + dc;
    while (r !== tr || c !== tc) {
      if (this.get(r, c) !== null) return false;
      r += dr; c += dc;
    }
    return true;
  }
}

// ── PGN Parser ──
function parsePGN(pgn) {
  if (!pgn || !pgn.trim()) return [];
  const games = [];
  const blocks = pgn.trim().split(/\n\n(?=\[)/);
  let i = 0;
  while (i < blocks.length) {
    const headerBlock = blocks[i];
    const headers = {};
    const headerRegex = /\[(\w+)\s+"([^"]*)"\]/g;
    let m;
    while ((m = headerRegex.exec(headerBlock)) !== null) headers[m[1]] = m[2];

    let movesText = '';
    const headerEnd = headerBlock.lastIndexOf(']');
    const afterHeaders = headerBlock.slice(headerEnd + 1).trim();
    if (afterHeaders && !afterHeaders.startsWith('[')) {
      movesText = afterHeaders;
    } else if (i + 1 < blocks.length && !blocks[i + 1].startsWith('[')) {
      i++;
      movesText = blocks[i];
    }

    const moves = [];
    if (movesText) {
      const cleaned = movesText.replace(/\{[^}]*\}/g, '').replace(/\([^)]*\)/g, '');
      const tokens = cleaned.split(/\s+/);
      for (const t of tokens) {
        if (!t) continue;
        if (t.match(/^\d+\.+$/)) continue;
        if (['1-0','0-1','1/2-1/2','*'].includes(t)) continue;
        const san = t.replace(/^\d+\./, '');
        if (san) moves.push(san);
      }
    }

    if (Object.keys(headers).length > 0) games.push({ headers, moves });
    i++;
  }
  return games;
}

// ── Globals ──
const games = [];
let currentGame = 0;
let currentMove = 0;
let positions = [];
let playing = false;
let playTimer = null;
const standings = [];
const medals = ['&#x1F947;', '&#x1F948;', '&#x1F949;'];

// ── Build positions for a game ──
function buildPositions(gameIdx) {
  const g = games[gameIdx];
  const engine = new ChessGame();
  const snaps = [{ board: engine.board.map(r => [...r]), from: null, to: null }];
  for (const san of g.moves) {
    const { from, to } = engine.applyMove(san);
    snaps.push({ board: engine.board.map(r => [...r]), from, to });
  }
  return snaps;
}

// ── Render ──
function renderBoard() {
  const pos = positions[currentMove] || { board: new ChessGame().initBoard(), from: null, to: null };
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  const files = 'abcdefgh';
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const sq = document.createElement('div');
      const isLight = (r + c) % 2 === 0;
      sq.className = 'sq ' + (isLight ? 'light' : 'dark');

      if (pos.from && pos.from[0] === r && pos.from[1] === c) sq.classList.add('last-from');
      if (pos.to && pos.to[0] === r && pos.to[1] === c) sq.classList.add('last-to');

      const piece = pos.board[r][c];
      if (piece) {
        const span = document.createElement('span');
        span.textContent = PIECE_UNICODE[piece];
        span.className = (piece === piece.toUpperCase()) ? 'piece-w' : 'piece-b';
        sq.appendChild(span);
      }

      if (c === 0) { const rl = document.createElement('span'); rl.className = 'rank-label'; rl.textContent = 8 - r; sq.appendChild(rl); }
      if (r === 7) { const fl = document.createElement('span'); fl.className = 'file-label'; fl.textContent = files[c]; sq.appendChild(fl); }
      boardEl.appendChild(sq);
    }
  }
}

function renderPlayerBars() {
  const g = games[currentGame];
  if (!g) return;
  document.getElementById('topName').textContent = g.headers.Black;
  document.getElementById('bottomName').textContent = g.headers.White;
  const result = g.headers.Result;
  const topBadge = document.getElementById('topBadge');
  const bottomBadge = document.getElementById('bottomBadge');

  if (currentMove < positions.length - 1) {
    topBadge.textContent = ''; bottomBadge.textContent = '';
    topBadge.className = 'badge'; bottomBadge.className = 'badge';
  } else {
    if (result === '1-0') {
      bottomBadge.textContent = 'WIN'; bottomBadge.className = 'badge win';
      topBadge.textContent = 'LOSE'; topBadge.className = 'badge lose';
    } else if (result === '0-1') {
      topBadge.textContent = 'WIN'; topBadge.className = 'badge win';
      bottomBadge.textContent = 'LOSE'; bottomBadge.className = 'badge lose';
    } else {
      topBadge.textContent = 'DRAW'; topBadge.className = 'badge draw';
      bottomBadge.textContent = 'DRAW'; bottomBadge.className = 'badge draw';
    }
  }
}

function renderStatus() {
  const g = games[currentGame];
  const el = document.getElementById('status');
  if (!g) { el.textContent = ''; return; }
  if (currentMove >= positions.length - 1) {
    el.textContent = g.headers.Termination || g.headers.Result;
  } else {
    const moveNum = Math.floor(currentMove / 2) + 1;
    const side = currentMove % 2 === 0 ? '백 차례' : '흑 차례';
    el.textContent = currentMove === 0 ? '대국 시작' : `${moveNum}수 - ${side}`;
  }
}

function renderMoveList() {
  const g = games[currentGame];
  const el = document.getElementById('moveList');
  if (!g) { el.innerHTML = ''; return; }
  let html = '';
  for (let i = 0; i < g.moves.length; i++) {
    if (i % 2 === 0) html += `<span class="move-num">${Math.floor(i / 2) + 1}.</span> `;
    const cls = (i + 1 === currentMove) ? 'current' : '';
    html += `<span class="move-san ${cls}" data-idx="${i + 1}">${g.moves[i]}</span> `;
    if (i % 2 === 1) html += '<br>';
  }
  el.innerHTML = html;
  const cur = el.querySelector('.move-san.current');
  if (cur) cur.scrollIntoView({ block: 'nearest' });
  el.querySelectorAll('.move-san').forEach(span => {
    span.addEventListener('click', () => { stopPlay(); currentMove = parseInt(span.dataset.idx); renderAll(); });
  });
}

function renderStandings() {
  const g = games[currentGame];
  const activeBots = g ? [g.headers.White, g.headers.Black] : [];
  let html = '<tr><th></th><th>봇</th><th>점수</th><th>승</th><th>무</th><th>패</th></tr>';
  standings.forEach((s, i) => {
    const cls = activeBots.includes(s.name) ? ' class="active-bot"' : '';
    html += `<tr${cls}><td><span class="medal">${medals[i] || ''}</span></td><td>${s.name}</td><td>${s.score}</td><td>${s.w}</td><td>${s.d}</td><td>${s.l}</td></tr>`;
  });
  document.getElementById('standings').innerHTML = html;
}

function renderGameList() {
  const el = document.getElementById('gameList');
  el.innerHTML = '';
  games.forEach((g, i) => {
    const btn = document.createElement('div');
    btn.className = 'game-btn' + (i === currentGame ? ' active' : '');
    const resultColor = g.headers.Result === '1-0' ? '#2ecc71' : g.headers.Result === '0-1' ? '#e74c3c' : '#f39c12';
    btn.innerHTML = `
      <span class="game-players">${g.headers.White} vs ${g.headers.Black}</span>
      <span class="game-result" style="color:${resultColor}">${g.headers.Result}</span>
      <div class="game-info">Round ${g.headers.Round} | ${g.headers.Opening || ''} | ${g.moves.length}수 | ${g.headers.Termination || ''}</div>
    `;
    btn.addEventListener('click', () => loadGame(i));
    el.appendChild(btn);
  });
}

function renderAll() {
  renderBoard();
  renderPlayerBars();
  renderStatus();
  renderMoveList();
  updateButtons();
}

function updateButtons() {
  document.getElementById('btnPrev').disabled = currentMove <= 0;
  document.getElementById('btnStart').disabled = currentMove <= 0;
  document.getElementById('btnNext').disabled = currentMove >= positions.length - 1;
  document.getElementById('btnEnd').disabled = currentMove >= positions.length - 1;
  document.getElementById('btnPlay').innerHTML = playing ? '&#x23F8;' : '&#x25B6;';
}

// ── Navigation ──
function loadGame(idx) {
  if (liveMode) return; // 라이브 중엔 수동 전환 불가
  stopPlay();
  currentGame = idx;
  currentMove = 0;
  positions = buildPositions(idx);
  renderGameList();
  renderStandings();
  renderAll();
}

function goNext() { if (currentMove < positions.length - 1) { currentMove++; renderAll(); } else stopPlay(); }
function goPrev() { if (currentMove > 0) { currentMove--; renderAll(); } }
function goStart() { currentMove = 0; renderAll(); }
function goEnd() { currentMove = positions.length - 1; renderAll(); }

function getSpeed() { return 1200 - parseInt(document.getElementById('speedSlider').value) * 100; }

function startPlay() {
  if (currentMove >= positions.length - 1) currentMove = 0;
  playing = true; updateButtons();
  playTimer = setInterval(() => { if (currentMove >= positions.length - 1) { stopPlay(); return; } currentMove++; renderAll(); }, getSpeed());
}

function stopPlay() { playing = false; clearInterval(playTimer); updateButtons(); }
function togglePlay() { playing ? stopPlay() : startPlay(); }

// ── Events ──
document.getElementById('btnPlay').addEventListener('click', togglePlay);
document.getElementById('btnNext').addEventListener('click', () => { stopPlay(); goNext(); });
document.getElementById('btnPrev').addEventListener('click', () => { stopPlay(); goPrev(); });
document.getElementById('btnStart').addEventListener('click', () => { stopPlay(); goStart(); });
document.getElementById('btnEnd').addEventListener('click', () => { stopPlay(); goEnd(); });
document.getElementById('speedSlider').addEventListener('input', () => { if (playing) { stopPlay(); startPlay(); } });

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') { stopPlay(); goNext(); }
  else if (e.key === 'ArrowLeft') { stopPlay(); goPrev(); }
  else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
  else if (e.key === 'Home') { stopPlay(); goStart(); }
  else if (e.key === 'End') { stopPlay(); goEnd(); }
});

// ============================================================
// MODE: LIVE
// ============================================================
let liveMode = false;
let liveTimer = null;
let liveLastMoveCount = 0;
let liveGameNumber = 0;

function enterLiveMode() {
  liveMode = true;
  document.getElementById('modeOverlay').style.display = 'none';
  document.getElementById('mainViewer').style.display = 'flex';
  document.getElementById('btnStop').style.display = '';
  document.getElementById('status').innerHTML = '<span class="live-badge"><span class="dot"></span>LIVE</span> 서버 연결 중...';

  games.length = 0;
  standings.length = 0;
  currentGame = 0; currentMove = 0;
  positions = [{ board: new ChessGame().initBoard(), from: null, to: null }];
  renderBoard(); renderGameList(); renderStandings();
  document.getElementById('moveList').innerHTML = '';
  document.getElementById('topName').textContent = '-';
  document.getElementById('bottomName').textContent = '-';
  document.getElementById('topBadge').textContent = ''; document.getElementById('topBadge').className = 'badge';
  document.getElementById('bottomBadge').textContent = ''; document.getElementById('bottomBadge').className = 'badge';

  liveLastMoveCount = 0;
  liveGameNumber = 0;
  liveTimer = setInterval(pollLive, 500);
}

function exitLiveMode() {
  liveMode = false;
  clearInterval(liveTimer);
  document.getElementById('btnStop').style.display = 'none';
  // 라이브 종료 후 완료된 게임이 있으면 복기 가능
  if (games.length > 0) {
    loadGame(0);
  }
}

async function stopTournament() {
  try {
    const res = await fetch('/stop', { method: 'POST' });
    const data = await res.json();
    if (data.stopped) {
      document.getElementById('status').innerHTML = '<span class="live-badge"><span class="dot" style="background:#e74c3c;animation:none;"></span>LIVE</span> 토너먼트 중단됨';
      document.getElementById('btnStop').style.display = 'none';
    }
  } catch (e) {
    document.getElementById('status').innerHTML = '<span class="live-badge"><span class="dot" style="background:#e74c3c;animation:none;"></span>LIVE</span> 중단 요청 실패';
  }
}

async function pollLive() {
  try {
    const res = await fetch('/live_state.json?t=' + Date.now());
    if (!res.ok) throw new Error('fetch failed');
    const state = await res.json();

    // 순위 업데이트
    if (state.standings && state.standings.length > 0) {
      standings.length = 0;
      state.standings.forEach(s => standings.push(s));
      renderStandings();
    }

    // 완료된 게임을 game list에 추가
    if (state.completed_games && state.completed_games.length > 0) {
      const newPgn = state.completed_games.join('\n\n');
      const parsed = parsePGN(newPgn);
      while (games.length < parsed.length) games.push(parsed[games.length]);
      for (let i = 0; i < parsed.length; i++) games[i] = parsed[i];
      renderGameList();
    }

    if (state.status === 'waiting') {
      document.getElementById('status').innerHTML = '<span class="live-badge"><span class="dot"></span>LIVE</span> 대국 대기 중...';
      return;
    }

    if (state.status === 'stopped') {
      document.getElementById('status').innerHTML = '<span class="live-badge"><span class="dot" style="background:#e74c3c;animation:none;"></span>LIVE</span> 토너먼트 중단됨';
      exitLiveMode();
      return;
    }

    if (state.status === 'finished') {
      document.getElementById('status').innerHTML = '<span class="live-badge"><span class="dot" style="background:#2ecc71;animation:none;"></span>LIVE</span> 토너먼트 종료';
      exitLiveMode();
      if (games.length > 0) loadGame(games.length - 1);
      return;
    }

    // 새 대국 감지
    if (state.game_number !== liveGameNumber) {
      liveGameNumber = state.game_number;
      liveLastMoveCount = 0;
    }

    // 수가 추가되었으면 보드 업데이트
    if (state.moves && state.moves.length > liveLastMoveCount) {
      const engine = new ChessGame();
      const snaps = [{ board: engine.board.map(r => [...r]), from: null, to: null }];
      for (const san of state.moves) {
        const { from, to } = engine.applyMove(san);
        snaps.push({ board: engine.board.map(r => [...r]), from, to });
      }
      positions = snaps;
      currentMove = positions.length - 1;

      document.getElementById('topName').textContent = state.black;
      document.getElementById('bottomName').textContent = state.white;

      const topBadge = document.getElementById('topBadge');
      const bottomBadge = document.getElementById('bottomBadge');
      if (state.result) {
        if (state.result === '1-0') {
          bottomBadge.textContent = 'WIN'; bottomBadge.className = 'badge win';
          topBadge.textContent = 'LOSE'; topBadge.className = 'badge lose';
        } else if (state.result === '0-1') {
          topBadge.textContent = 'WIN'; topBadge.className = 'badge win';
          bottomBadge.textContent = 'LOSE'; bottomBadge.className = 'badge lose';
        } else {
          topBadge.textContent = 'DRAW'; topBadge.className = 'badge draw';
          bottomBadge.textContent = 'DRAW'; bottomBadge.className = 'badge draw';
        }
      } else {
        topBadge.textContent = ''; topBadge.className = 'badge';
        bottomBadge.textContent = ''; bottomBadge.className = 'badge';
      }

      renderBoard();

      const moveListEl = document.getElementById('moveList');
      let html = '';
      for (let i = 0; i < state.moves.length; i++) {
        if (i % 2 === 0) html += `<span class="move-num">${Math.floor(i / 2) + 1}.</span> `;
        const cls = (i === state.moves.length - 1) ? 'current' : '';
        html += `<span class="move-san ${cls}">${state.moves[i]}</span> `;
        if (i % 2 === 1) html += '<br>';
      }
      moveListEl.innerHTML = html;
      const cur = moveListEl.querySelector('.move-san.current');
      if (cur) cur.scrollIntoView({ block: 'nearest' });

      const moveNum = Math.floor(state.moves.length / 2) + (state.moves.length % 2);
      let statusText = '';
      if (state.result) {
        statusText = `대국 ${state.game_number} 종료 - ${state.reason}`;
      } else {
        const side = state.moves.length % 2 === 0 ? '백 차례' : '흑 차례';
        statusText = `대국 ${state.game_number}: ${state.white} vs ${state.black} - ${moveNum}수 ${side}`;
      }
      document.getElementById('status').innerHTML = `<span class="live-badge"><span class="dot"></span>LIVE</span> ${statusText}`;

      liveLastMoveCount = state.moves.length;
      updateButtons();
    }
  } catch (e) {
    // 서버 연결 실패 시 무시 (오버레이에서 이미 처리)
  }
}

document.getElementById('btnStop').addEventListener('click', stopTournament);

// ============================================================
// MODE: REPLAY (파일 업로드)
// ============================================================
function enterReplayMode() {
  document.getElementById('fileUploadArea').style.display = 'block';
}

function loadReplayData(pgnText, jsonText) {
  // PGN 파싱
  const parsed = parsePGN(pgnText);
  games.length = 0;
  parsed.forEach(g => games.push(g));

  // JSON standings 파싱
  standings.length = 0;
  if (jsonText) {
    try {
      const data = JSON.parse(jsonText);
      if (data.standings) {
        data.standings.forEach(s => standings.push({
          name: s.name, score: s.score, w: s.wins, d: s.draws, l: s.losses
        }));
      }
    } catch (e) { console.warn('results.json 파싱 실패', e); }
  }

  document.getElementById('modeOverlay').style.display = 'none';
  document.getElementById('mainViewer').style.display = 'flex';

  if (games.length > 0) {
    loadGame(0);
  } else {
    renderBoard(); renderStandings(); renderGameList();
  }
}

// 파일 업로드 핸들러
const fileDrop = document.getElementById('fileDrop');
const fileInput = document.getElementById('fileInput');
let pendingFiles = {};

fileDrop.addEventListener('click', () => fileInput.click());
fileDrop.addEventListener('dragover', e => { e.preventDefault(); fileDrop.classList.add('dragover'); });
fileDrop.addEventListener('dragleave', () => fileDrop.classList.remove('dragover'));
fileDrop.addEventListener('drop', e => { e.preventDefault(); fileDrop.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', e => handleFiles(e.target.files));

function handleFiles(fileList) {
  for (const file of fileList) {
    const reader = new FileReader();
    reader.onload = (e) => {
      if (file.name.endsWith('.pgn')) pendingFiles.pgn = e.target.result;
      else if (file.name.endsWith('.json')) pendingFiles.json = e.target.result;

      // PGN만 있어도 로드 가능
      if (pendingFiles.pgn) {
        fileDrop.innerHTML = `<b>${Object.keys(pendingFiles).join(', ')}</b> 로드 완료!`;
        setTimeout(() => loadReplayData(pendingFiles.pgn, pendingFiles.json || null), 500);
      }
    };
    reader.readAsText(file);
  }
}

// ============================================================
// INIT: 자동 모드 감지
// ============================================================
async function init() {
  let serverAvailable = false;

  try {
    const res = await fetch('/live_state.json?t=' + Date.now());
    if (res.ok) {
      const state = await res.json();
      serverAvailable = true;

      // 서버가 있고 토너먼트가 진행 중이면 자동 라이브 모드
      if (state.status === 'playing' || state.status === 'waiting') {
        enterLiveMode();
        return;
      }

      // 서버가 있지만 토너먼트가 끝난 경우 → 완료된 게임 로드
      if (state.status === 'finished' || state.status === 'stopped') {
        if (state.completed_games && state.completed_games.length > 0) {
          const parsed = parsePGN(state.completed_games.join('\n\n'));
          parsed.forEach(g => games.push(g));
        }
        if (state.standings) {
          state.standings.forEach(s => standings.push(s));
        }
        document.getElementById('modeOverlay').style.display = 'none';
        document.getElementById('mainViewer').style.display = 'flex';
        if (games.length > 0) loadGame(0);
        else { renderBoard(); renderStandings(); renderGameList(); }
        return;
      }
    }
  } catch (e) { /* 서버 없음 */ }

  // 서버 없음 → 모드 선택 오버레이 표시
  document.getElementById('modeOverlay').style.display = 'flex';
  document.getElementById('mainViewer').style.display = 'none';

  if (!serverAvailable) {
    document.getElementById('btnModeLive').disabled = true;
    document.getElementById('modeDesc').textContent = '서버 미연결 - 복기 모드만 사용 가능합니다';
  }
}

document.getElementById('btnModeLive').addEventListener('click', enterLiveMode);
document.getElementById('btnModeReplay').addEventListener('click', enterReplayMode);

init();
</script>
